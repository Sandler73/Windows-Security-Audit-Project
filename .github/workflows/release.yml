# ============================================================================
# Release Workflow
# ----------------------------------------------------------------------------
# Triggered on tag push (v*). Performs:
#   1. Version sync verification (tag matches $script:ScriptVersion)
#   2. Final lint pass on tagged commit
#   3. Smoke test on windows-2025 + windows-2022
#   4. Build release archive (zip)
#   5. Compute checksums (SHA-256 + MD5)
#   6. Generate release notes from CHANGELOG.md
#   7. Create GitHub Release with archive + checksums
# ============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v6.1.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # --------------------------------------------------------------------------
  # Verify version sync between tag and script
  # --------------------------------------------------------------------------
  verify-version:
    name: Verify version sync
    runs-on: windows-latest
    timeout-minutes: 10

    outputs:
      version: ${{ steps.extract.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract tag version
        id: extract
        shell: pwsh
        run: |
          $tag = if ('${{ github.event.inputs.tag }}') { '${{ github.event.inputs.tag }}' } else { '${{ github.ref_name }}' }
          $version = $tag.TrimStart('v')
          Write-Host "Tag:     $tag"
          Write-Host "Version: $version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Verify ScriptVersion matches tag
        shell: pwsh
        run: |
          $expected = '${{ steps.extract.outputs.version }}'
          $orchPath = '.\Windows-Security-Audit.ps1'
          $matches = Select-String -Path $orchPath -Pattern '\$script:ScriptVersion\s*=\s*"([^"]+)"'
          if (-not $matches) { throw "ScriptVersion not found in orchestrator" }
          $actual = $matches.Matches[0].Groups[1].Value
          Write-Host "Expected (tag):  $expected"
          Write-Host "Actual (script): $actual"
          if ($actual -ne $expected) {
            throw "Version mismatch: tag=$expected, ScriptVersion=$actual"
          }

      - name: Verify shared library version matches
        shell: pwsh
        run: |
          $expected = '${{ steps.extract.outputs.version }}'
          $libPath = '.\shared_components\audit-common.ps1'
          $matches = Select-String -Path $libPath -Pattern 'COMMON_LIB_VERSION\s*=\s*"([^"]+)"'
          if (-not $matches) { throw "COMMON_LIB_VERSION not found" }
          $actual = $matches.Matches[0].Groups[1].Value
          if ($actual -ne $expected) {
            throw "Library version mismatch: tag=$expected, lib=$actual"
          }

      - name: Verify all module versions match
        shell: pwsh
        run: |
          $expected = '${{ steps.extract.outputs.version }}'
          $mismatches = @()
          Get-ChildItem '.\modules' -Filter 'module-*.ps1' | ForEach-Object {
            $matches = Select-String -Path $_.FullName -Pattern '\$moduleVersion\s*=\s*"([^"]+)"'
            if ($matches) {
              $version = $matches.Matches[0].Groups[1].Value
              if ($version -ne $expected) {
                $mismatches += "$($_.Name): $version"
              }
            }
          }
          if ($mismatches.Count -gt 0) {
            throw "Module version mismatches:`n$($mismatches -join "`n")"
          }
          Write-Host "All 16 module versions match tag $expected"

  # --------------------------------------------------------------------------
  # Smoke test on tagged commit
  # --------------------------------------------------------------------------
  smoke-test:
    name: Smoke test (${{ matrix.os }})
    needs: verify-version
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: true
      matrix:
        os: [windows-2025, windows-2022]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify orchestrator runs
        shell: pwsh
        run: |
          .\Windows-Security-Audit.ps1 -Help | Out-Null
          .\Windows-Security-Audit.ps1 -ListModules | Out-Null

      - name: Run quick smoke audit
        shell: pwsh
        run: |
          .\Windows-Security-Audit.ps1 `
            -Modules core `
            -OutputFormat JSON `
            -OutputPath .\smoke-test.json `
            -Quiet
          $data = Get-Content .\smoke-test.json -Raw | ConvertFrom-Json
          $count = @($data.Results).Count
          if ($count -lt 100) {
            throw "Smoke test produced only $count results"
          }
          Write-Host "Smoke test passed: $count results"

  # --------------------------------------------------------------------------
  # Build release archive
  # --------------------------------------------------------------------------
  build-release:
    name: Build release archive
    needs: [verify-version, smoke-test]
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build archive
        shell: pwsh
        run: |
          $version = '${{ needs.verify-version.outputs.version }}'
          $archiveName = "Windows-Security-Audit-v$version.zip"

          # Stage in a clean directory
          $stage = Join-Path $env:RUNNER_TEMP 'release-stage'
          New-Item -Path $stage -ItemType Directory -Force | Out-Null
          $contents = Join-Path $stage 'Windows-Security-Audit'
          New-Item -Path $contents -ItemType Directory -Force | Out-Null

          # Copy everything except git/CI artifacts
          Get-ChildItem -Path . -Exclude @('.git','.github','.gitignore') | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination $contents -Recurse -Force
          }
          # Include .gitignore explicitly
          if (Test-Path '.gitignore') {
            Copy-Item -Path '.gitignore' -Destination $contents -Force
          }

          # Create archive
          Compress-Archive -Path $contents -DestinationPath ".\$archiveName" -Force
          Write-Host "Archive built: $archiveName"
          Get-Item $archiveName | Format-List Name, Length

      - name: Compute checksums
        shell: pwsh
        run: |
          $version = '${{ needs.verify-version.outputs.version }}'
          $archiveName = "Windows-Security-Audit-v$version.zip"

          "Windows Security Audit Project v$version - Release Checksums"          | Out-File -FilePath checksums.txt
          "Released: $((Get-Date).ToString('yyyy-MM-dd HH:mm:ss UTC'))"           | Add-Content -Path checksums.txt
          ''                                                                       | Add-Content -Path checksums.txt
          ''                                                                       | Add-Content -Path checksums.txt
          'SHA-256:'                                                               | Add-Content -Path checksums.txt
          (Get-FileHash $archiveName -Algorithm SHA256).Hash                       | Add-Content -Path checksums.txt
          ''                                                                       | Add-Content -Path checksums.txt
          'MD5 (verification only, not for security):'                             | Add-Content -Path checksums.txt
          (Get-FileHash $archiveName -Algorithm MD5).Hash                          | Add-Content -Path checksums.txt
          ''                                                                       | Add-Content -Path checksums.txt
          'Verification:'                                                          | Add-Content -Path checksums.txt
          "  Get-FileHash $archiveName -Algorithm SHA256"                          | Add-Content -Path checksums.txt

          Get-Content checksums.txt

      - name: Upload archive artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-archive
          path: |
            Windows-Security-Audit-v*.zip
            checksums.txt
          retention-days: 90

  # --------------------------------------------------------------------------
  # Create GitHub Release
  # --------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    needs: [verify-version, build-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download archive
        uses: actions/download-artifact@v6
        with:
          name: release-archive
          path: ./release

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          version="${{ needs.verify-version.outputs.version }}"
          # Extract section between this version and the next ## or end of file
          notes=$(awk -v ver="$version" '
            $0 ~ "^## (\\[)?"ver"(\\])?" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' docs/project/CHANGELOG.md)

          if [ -z "$notes" ]; then
            notes="See [CHANGELOG.md](https://github.com/Sandler73/Windows-Security-Audit-Project/blob/main/docs/project/CHANGELOG.md) for release details."
          fi

          {
            echo "notes<<EOF"
            echo "$notes"
            echo ""
            echo "---"
            echo ""
            echo "**Verification:**"
            echo '```powershell'
            echo "Get-FileHash Windows-Security-Audit-v$version.zip -Algorithm SHA256"
            echo '```'
            echo ""
            echo "Compare against the hash listed in \`checksums.txt\`."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: 'Windows Security Audit v${{ needs.verify-version.outputs.version }}'
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            release/Windows-Security-Audit-v*.zip
            release/checksums.txt
          generate_release_notes: false
          draft: false
          prerelease: false
