# ============================================================================
# Unit Tests Workflow
# ----------------------------------------------------------------------------
# Runs Pester unit tests (audit-common, module-schema, result-schema) across
# the full matrix of currently-supported Windows versions:
#
#   GitHub-hosted runners:
#     - windows-2025  (Windows Server 2025 - PowerShell 5.1 + 7.x)
#     - windows-2022  (Windows Server 2022 - PowerShell 5.1 + 7.x)
#     - windows-2019  (Windows Server 2019 - PowerShell 5.1 + 7.x)
#
#   Self-hosted runners (configured per-installation):
#     - self-hosted-server-2016  (Windows Server 2016)
#     - self-hosted-win11-21h2   (Windows 11 21H2)
#     - self-hosted-win11-22h2   (Windows 11 22H2)
#     - self-hosted-win11-23h2   (Windows 11 23H2)
#     - self-hosted-win11-24h2   (Windows 11 24H2)
#     - self-hosted-win10-21h2   (Windows 10 21H2)
#     - self-hosted-win10-22h2   (Windows 10 22H2)
#     - self-hosted-win10-iotltsc-2021  (Windows 10 IoT LTSC 2021)
#
# Each runner tests both PowerShell 5.1 (Desktop) and PowerShell 7.x (Core).
# ============================================================================

name: Unit Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # GitHub-hosted Windows Server runners
  # --------------------------------------------------------------------------
  pester-hosted:
    name: Pester (${{ matrix.os }} / PS ${{ matrix.ps }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, windows-2022, windows-2019]
        ps: ['5.1', '7']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify environment
        shell: ${{ matrix.ps == '5.1' && 'powershell' || 'pwsh' }}
        run: |
          Write-Host "Runner OS:     ${{ matrix.os }}"
          Write-Host "PowerShell:    $($PSVersionTable.PSVersion)"
          Write-Host "Edition:       $($PSVersionTable.PSEdition)"
          Write-Host "Pester:        $((Get-Module Pester -ListAvailable | Sort-Object Version -Descending | Select-Object -First 1).Version)"

      - name: Install / verify Pester 5.x
        shell: ${{ matrix.ps == '5.1' && 'powershell' || 'pwsh' }}
        run: |
          if (-not (Get-Module Pester -ListAvailable | Where-Object { $_.Version -ge '5.0.0' })) {
            Install-Module -Name Pester -RequiredVersion 5.7.1 -Force -SkipPublisherCheck -Scope CurrentUser
          }
          Import-Module Pester -MinimumVersion 5.0.0
          Write-Host "Pester loaded: $((Get-Module Pester).Version)"

      - name: Run unit tests (audit-common, module-schema)
        shell: ${{ matrix.ps == '5.1' && 'powershell' || 'pwsh' }}
        run: |
          Import-Module Pester -MinimumVersion 5.0.0

          $config = New-PesterConfiguration
          $config.Run.Path = @(
            '.\tests\audit-common.Tests.ps1',
            '.\tests\module-schema.Tests.ps1'
          )
          $config.Run.PassThru = $true
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = "test-results-${{ matrix.os }}-ps${{ matrix.ps }}.xml"
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $true

          $result = Invoke-Pester -Configuration $config

          Write-Host ""
          Write-Host "====== Summary ======"
          Write-Host "Total:    $($result.TotalCount)"
          Write-Host "Passed:   $($result.PassedCount)"
          Write-Host "Failed:   $($result.FailedCount)"
          Write-Host "Skipped:  $($result.SkippedCount)"

          if ($result.FailedCount -gt 0) { exit 1 }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ matrix.os }}-ps${{ matrix.ps }}
          path: test-results-${{ matrix.os }}-ps${{ matrix.ps }}.xml
          retention-days: 30

  # --------------------------------------------------------------------------
  # Self-hosted client/server runners
  # --------------------------------------------------------------------------
  # NOTE: requires self-hosted runner configuration with matching labels.
  # Each runner machine should have Pester 5.x and the runner agent installed.
  # If self-hosted runners are not configured, this job is skipped via
  # workflow_dispatch input or is allowed to fail without blocking.
  # --------------------------------------------------------------------------
  pester-self-hosted:
    name: Pester (${{ matrix.runner.os }} / PS ${{ matrix.ps }})
    runs-on:
      - self-hosted
      - ${{ matrix.runner.label }}
    timeout-minutes: 45
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        runner:
          - { label: server-2016,        os: 'Windows Server 2016' }
          - { label: win11-21h2,         os: 'Windows 11 21H2' }
          - { label: win11-22h2,         os: 'Windows 11 22H2' }
          - { label: win11-23h2,         os: 'Windows 11 23H2' }
          - { label: win11-24h2,         os: 'Windows 11 24H2' }
          - { label: win10-21h2,         os: 'Windows 10 21H2' }
          - { label: win10-22h2,         os: 'Windows 10 22H2' }
          - { label: win10-iotltsc-2021, os: 'Windows 10 IoT LTSC 2021' }
        ps: ['5.1', '7']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify runner identity
        shell: ${{ matrix.ps == '5.1' && 'powershell' || 'pwsh' }}
        run: |
          Write-Host "Expected: ${{ matrix.runner.os }}"
          $os = Get-CimInstance Win32_OperatingSystem
          Write-Host "Actual:   $($os.Caption) (build $($os.BuildNumber))"
          Write-Host "PowerShell: $($PSVersionTable.PSVersion) ($($PSVersionTable.PSEdition))"

      - name: Run unit tests
        shell: ${{ matrix.ps == '5.1' && 'powershell' || 'pwsh' }}
        run: |
          Import-Module Pester -MinimumVersion 5.0.0 -ErrorAction SilentlyContinue
          if (-not (Get-Module Pester)) {
            Install-Module -Name Pester -RequiredVersion 5.7.1 -Force -SkipPublisherCheck -Scope CurrentUser
            Import-Module Pester -MinimumVersion 5.0.0
          }

          $config = New-PesterConfiguration
          $config.Run.Path = @(
            '.\tests\audit-common.Tests.ps1',
            '.\tests\module-schema.Tests.ps1',
            '.\tests\result-schema.Tests.ps1'
          )
          $config.Run.PassThru = $true
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = "test-results-${{ matrix.runner.label }}-ps${{ matrix.ps }}.xml"
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.Output.Verbosity = 'Detailed'

          $result = Invoke-Pester -Configuration $config

          if ($result.FailedCount -gt 0) { exit 1 }

      - name: Upload self-hosted test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ matrix.runner.label }}-ps${{ matrix.ps }}
          path: test-results-${{ matrix.runner.label }}-ps${{ matrix.ps }}.xml
          retention-days: 30

  # --------------------------------------------------------------------------
  # Aggregate test summary
  # --------------------------------------------------------------------------
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [pester-hosted]
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: test-results

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Pester Test Results
          path: 'test-results/**/*.xml'
          reporter: java-junit
          fail-on-error: false
