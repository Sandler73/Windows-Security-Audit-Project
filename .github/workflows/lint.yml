# ============================================================================
# Lint Workflow
# ----------------------------------------------------------------------------
# Static analysis on every push/PR:
#   - PSScriptAnalyzer (PowerShell linting rules)
#   - ASCII-only character verification
#   - BOM-byte detection
#   - PowerShell AST syntax validation (catches unbalanced braces,
#     parens, brackets, and any other syntactic error)
#   - $null left-side comparison enforcement
#   - Single 'return $results' enforcement per module
#
# Runs on the latest GitHub-hosted Windows runner. Light/fast (<60s).
# ============================================================================

name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify PowerShell version
        shell: pwsh
        run: |
          Write-Host "PowerShell: $($PSVersionTable.PSVersion)"
          Write-Host "Edition:    $($PSVersionTable.PSEdition)"
          Write-Host "OS:         $($PSVersionTable.OS)"

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $excludeRules = @(
            'PSAvoidUsingWriteHost',
            'PSUseShouldProcessForStateChangingFunctions',
            'PSAvoidGlobalVars',
            'PSUseDeclaredVarsMoreThanAssignments'
          )

          $results = Invoke-ScriptAnalyzer `
            -Path . `
            -Recurse `
            -ExcludeRule $excludeRules `
            -Severity Error,Warning `
            -ReportSummary

          if ($results) {
            $errors = @($results | Where-Object Severity -eq 'Error')
            $warnings = @($results | Where-Object Severity -eq 'Warning')

            Write-Host ""
            Write-Host "Total findings: $($results.Count)"
            Write-Host "  Errors:   $($errors.Count)"
            Write-Host "  Warnings: $($warnings.Count)"
            Write-Host ""

            $results | Format-Table -Property RuleName,Severity,ScriptName,Line,Message -AutoSize -Wrap

            if ($errors.Count -gt 0) {
              Write-Error "PSScriptAnalyzer found $($errors.Count) errors"
              exit 1
            }
          } else {
            Write-Host "PSScriptAnalyzer: clean"
          }

  ascii-only:
    name: ASCII-only character check
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify all .ps1 files are ASCII-only
        shell: pwsh
        run: |
          $offenders = @()
          Get-ChildItem -Recurse -Include *.ps1 | ForEach-Object {
            $bytes = [System.IO.File]::ReadAllBytes($_.FullName)
            $nonAscii = @($bytes | Where-Object { $_ -gt 127 })
            if ($nonAscii.Count -gt 0) {
              $offenders += [PSCustomObject]@{
                Path = $_.FullName.Replace($PWD.Path, '.')
                NonAsciiBytes = $nonAscii.Count
              }
            }
          }

          if ($offenders.Count -gt 0) {
            $offenders | Format-Table -AutoSize
            Write-Error "Found $($offenders.Count) files with non-ASCII characters"
            exit 1
          } else {
            Write-Host "All .ps1 files are ASCII-only"
          }

  no-bom:
    name: BOM-byte check
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify no .ps1 files have UTF-8 BOM
        shell: pwsh
        run: |
          $offenders = @()
          Get-ChildItem -Recurse -Include *.ps1 | ForEach-Object {
            $bytes = [System.IO.File]::ReadAllBytes($_.FullName)
            if ($bytes.Length -ge 3 -and
                $bytes[0] -eq 0xEF -and
                $bytes[1] -eq 0xBB -and
                $bytes[2] -eq 0xBF) {
              $offenders += $_.FullName.Replace($PWD.Path, '.')
            }
          }

          if ($offenders.Count -gt 0) {
            $offenders | ForEach-Object { Write-Host "  BOM: $_" }
            Write-Error "Found $($offenders.Count) files with UTF-8 BOM"
            exit 1
          } else {
            Write-Host "No BOM bytes detected in any .ps1 file"
          }

  syntax-validation:
    name: PowerShell syntax validation
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify all .ps1 files parse without syntax errors
        shell: pwsh
        run: |
          # Use the PowerShell AST parser. If a file has unbalanced braces,
          # parens, brackets, or any other syntax error, the parser reports
          # it. Manual brace counting via regex cannot reliably distinguish
          # structural braces from braces inside strings, comments, here-
          # strings, or sub-expression interpolations like "$($var)".
          $offenders = @()
          Get-ChildItem -Recurse -Include *.ps1 | ForEach-Object {
            $parseErrors = $null
            $parseTokens = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName, [ref]$parseTokens, [ref]$parseErrors
            )
            if ($parseErrors -and $parseErrors.Count -gt 0) {
              foreach ($err in $parseErrors) {
                $offenders += [PSCustomObject]@{
                  Path    = $_.FullName.Replace($PWD.Path, '.')
                  Line    = $err.Extent.StartLineNumber
                  Column  = $err.Extent.StartColumnNumber
                  Message = $err.Message
                }
              }
            }
          }

          if ($offenders.Count -gt 0) {
            $offenders | Format-Table -AutoSize -Wrap
            Write-Error "Found $($offenders.Count) syntax error(s) across .ps1 files"
            exit 1
          } else {
            Write-Host "All .ps1 files parse without syntax errors"
          }

  null-comparisons:
    name: Null left-side comparison check
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify all $null comparisons are left-side
        shell: pwsh
        run: |
          $offenders = @()
          Get-ChildItem -Recurse -Include *.ps1 | ForEach-Object {
            $content = Get-Content -Path $_.FullName -Raw

            # Find right-side patterns: -eq $null or -ne $null
            $matches = [regex]::Matches($content, '-(?:eq|ne)\s+\$null\b')

            # Filter out comments and parameter defaults
            $codeMatches = @()
            $lines = $content -split "`n"
            foreach ($m in $matches) {
              $idx = $m.Index
              # Find which line this is on
              $beforeMatch = $content.Substring(0, $idx)
              $lineNum = ($beforeMatch -split "`n").Count
              $line = $lines[$lineNum - 1]

              # Skip if line is a comment
              if ($line -match '^\s*#') { continue }
              # Skip if it's a parameter default value
              if ($line -match '\[Parameter') { continue }
              if ($line -match '=\s*\$null\s*[\),]') { continue }

              $codeMatches += [PSCustomObject]@{
                Path = $_.FullName.Replace($PWD.Path, '.')
                Line = $lineNum
                Match = $line.Trim()
              }
            }

            if ($codeMatches.Count -gt 0) {
              $offenders += $codeMatches
            }
          }

          if ($offenders.Count -gt 0) {
            $offenders | Format-Table -AutoSize -Wrap
            Write-Warning "Found $($offenders.Count) right-side `$null comparisons (should be left-side)"
            # Warning only - some legitimate cases exist
          } else {
            Write-Host "All `$null comparisons are left-side"
          }

  return-statement:
    name: Single return statement per module
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify each module has exactly one 'return $results' statement
        shell: pwsh
        run: |
          $offenders = @()
          Get-ChildItem -Path '.\modules' -Filter 'module-*.ps1' | ForEach-Object {
            $content = Get-Content -Path $_.FullName -Raw
            $matches = [regex]::Matches($content, 'return\s+\$results\b')
            if ($matches.Count -ne 1) {
              $offenders += [PSCustomObject]@{
                Path = $_.Name
                ReturnStatements = $matches.Count
              }
            }
          }

          if ($offenders.Count -gt 0) {
            $offenders | Format-Table -AutoSize
            Write-Error "Found $($offenders.Count) modules with non-singular 'return `$results'"
            exit 1
          } else {
            Write-Host "All modules have exactly one 'return `$results' statement"
          }
