# ============================================================================
# Integration Tests Workflow
# ----------------------------------------------------------------------------
# Runs end-to-end audit executions across all currently-supported Windows
# versions to verify the orchestrator + modules + shared library work
# correctly as an integrated system.
#
# This is the slower of the two test workflows. Tests:
#   - Single-module standalone execution
#   - Full 16-module orchestrator execution
#   - All output formats (HTML, JSON, CSV, XML)
#   - Parallel vs sequential execution equivalence
#   - Cache vs no-cache behavior
#   - Auto-logging behavior
#   - Help system invocation forms
# ============================================================================

name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      include_self_hosted:
        description: 'Include self-hosted runners (requires registered runners)'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 6 * * 0'  # Weekly Sunday 6am UTC

# Cancel in-progress runs when a new push lands on the same branch / PR.
# Prevents queue pile-up under the GitHub Free plan's 20-concurrent-job cap.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # GitHub-hosted Windows Server runners
  # --------------------------------------------------------------------------
  e2e-hosted:
    name: E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, windows-2022, windows-2019]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show environment
        shell: pwsh
        run: |
          Write-Host "OS: ${{ matrix.os }}"
          $os = Get-CimInstance Win32_OperatingSystem
          Write-Host "Caption: $($os.Caption)"
          Write-Host "Build:   $($os.BuildNumber)"
          Write-Host "PSVersion: $($PSVersionTable.PSVersion)"

      - name: Verify orchestrator help system
        shell: pwsh
        run: |
          # Capture all streams (1=stdout, 2=stderr, 3=warning, 4=verbose,
          # 5=debug, 6=information). Show-DetailedHelp uses Write-Host, which
          # emits to stream 6 -- a `2>&1` redirect would miss it.
          $output = & .\Windows-Security-Audit.ps1 -Help *>&1 | Out-String

          Write-Host "----- Captured help output (first 800 chars) -----"
          $preview = if ($output.Length -gt 800) { $output.Substring(0, 800) + '...' } else { $output }
          Write-Host $preview
          Write-Host "----- End preview (total length: $($output.Length) chars) -----"

          if ($output -notmatch 'Windows Security Audit') {
            throw "Help output missing expected content (no 'Windows Security Audit' string found in $($output.Length) chars of output)"
          }
          Write-Host "Help system: OK"

      - name: Verify module discovery
        shell: pwsh
        run: |
          $output = & .\Windows-Security-Audit.ps1 -ListModules *>&1 | Out-String

          Write-Host "----- Captured -ListModules output -----"
          Write-Host $output
          Write-Host "----- End output -----"

          $expected = @('acsc','cis','cisa','cmmc','core','enisa','gdpr','hipaa',
                        'iso27001','ms','ms-defenderatp','nist','nsa','pcidss','soc2','stig')
          $missing = @()
          foreach ($mod in $expected) {
            if ($output -notmatch $mod) { $missing += $mod }
          }
          if ($missing.Count -gt 0) {
            throw "Modules missing from -ListModules output: $($missing -join ', ')"
          }
          Write-Host "All 16 modules discoverable"

      - name: Run single-module audit (core)
        shell: pwsh
        run: |
          # The orchestrator constructs filenames as
          # Windows-Security-Audit-{ComputerName}-{yyyy-MM-dd_HHmmss}.{ext}
          # and treats -OutputPath as a directory hint (uses parent of any
          # path passed). Each test step uses its own subdirectory so we can
          # find the generated file unambiguously via wildcard.
          New-Item -Path .\test-output\core -ItemType Directory -Force | Out-Null
          .\Windows-Security-Audit.ps1 `
            -Modules core `
            -OutputFormat JSON `
            -OutputPath .\test-output\core\out `
            -Quiet
          $jsonFiles = @(Get-ChildItem -Path .\test-output\core `
                          -Filter 'Windows-Security-Audit-*.json')
          if ($jsonFiles.Count -eq 0) {
            Write-Host "Directory contents:"
            Get-ChildItem .\test-output\core -Recurse | Format-Table -AutoSize
            throw "No JSON output generated in .\test-output\core\"
          }
          $jsonPath = $jsonFiles[0].FullName
          Write-Host "Generated: $jsonPath"
          $data = Get-Content $jsonPath -Raw | ConvertFrom-Json
          $count = @($data.Results).Count
          Write-Host "core module emitted $count results"
          if ($count -lt 50) {
            throw "core module emitted only $count results (expected >=50)"
          }

      - name: Run multi-module sequential audit
        shell: pwsh
        run: |
          New-Item -Path .\test-output\multi-seq -ItemType Directory -Force | Out-Null
          .\Windows-Security-Audit.ps1 `
            -Modules core,cis,stig `
            -OutputFormat JSON `
            -OutputPath .\test-output\multi-seq\out `
            -Quiet
          $jsonFiles = @(Get-ChildItem -Path .\test-output\multi-seq `
                          -Filter 'Windows-Security-Audit-*.json')
          if ($jsonFiles.Count -eq 0) {
            throw "No JSON output generated in .\test-output\multi-seq\"
          }
          $data = Get-Content $jsonFiles[0].FullName -Raw | ConvertFrom-Json
          $count = @($data.Results).Count
          Write-Host "Sequential 3-module audit: $count results"
          if ($count -lt 150) {
            throw "Multi-module audit emitted only $count results (expected >=150)"
          }

      - name: Run multi-module parallel audit
        shell: pwsh
        run: |
          New-Item -Path .\test-output\multi-par -ItemType Directory -Force | Out-Null
          .\Windows-Security-Audit.ps1 `
            -Modules core,cis,stig `
            -OutputFormat JSON `
            -OutputPath .\test-output\multi-par\out `
            -Parallel -Workers 2 `
            -Quiet
          $parJsonFiles = @(Get-ChildItem -Path .\test-output\multi-par `
                              -Filter 'Windows-Security-Audit-*.json')
          if ($parJsonFiles.Count -eq 0) {
            throw "No JSON output generated in .\test-output\multi-par\"
          }
          $data = Get-Content $parJsonFiles[0].FullName -Raw | ConvertFrom-Json
          $count = @($data.Results).Count
          Write-Host "Parallel 3-module audit: $count results"

          # Compare to sequential within 5%
          $seqJsonFiles = @(Get-ChildItem -Path .\test-output\multi-seq `
                              -Filter 'Windows-Security-Audit-*.json')
          $seqData = Get-Content $seqJsonFiles[0].FullName -Raw | ConvertFrom-Json
          $seqCount = @($seqData.Results).Count
          $delta = [math]::Abs($count - $seqCount)
          $tolerance = $seqCount * 0.05
          if ($delta -gt $tolerance) {
            Write-Warning "Sequential and parallel results differ by $delta (>5%)"
          } else {
            Write-Host "Sequential and parallel within tolerance"
          }

      - name: Run all-format multi-output audit
        shell: pwsh
        run: |
          New-Item -Path .\test-output\all-format -ItemType Directory -Force | Out-Null
          .\Windows-Security-Audit.ps1 `
            -Modules core `
            -OutputFormat All `
            -OutputPath .\test-output\all-format\out `
            -Quiet
          @('html','json','csv','xml') | ForEach-Object {
            $files = @(Get-ChildItem -Path .\test-output\all-format `
                          -Filter "Windows-Security-Audit-*.$_")
            if ($files.Count -eq 0) {
              Write-Host "Directory contents:"
              Get-ChildItem .\test-output\all-format | Format-Table -AutoSize
              throw "Expected $_ output file missing in .\test-output\all-format\"
            }
            Write-Host "  Generated: $($files[0].Name) ($($files[0].Length) bytes)"
          }

      - name: Run full 16-module audit (parallel)
        shell: pwsh
        run: |
          New-Item -Path .\test-output\full -ItemType Directory -Force | Out-Null
          $start = Get-Date
          .\Windows-Security-Audit.ps1 `
            -Modules All `
            -OutputFormat JSON `
            -OutputPath .\test-output\full\out `
            -Parallel -Workers 4 `
            -Quiet
          $duration = (Get-Date) - $start

          $jsonFiles = @(Get-ChildItem -Path .\test-output\full `
                          -Filter 'Windows-Security-Audit-*.json')
          if ($jsonFiles.Count -eq 0) {
            throw "No JSON output generated in .\test-output\full\"
          }
          $jsonPath = $jsonFiles[0].FullName
          $data = Get-Content $jsonPath -Raw | ConvertFrom-Json
          $count = @($data.Results).Count
          $modules = @($data.Results.Module | Sort-Object -Unique)

          Write-Host ""
          Write-Host "Full audit duration: $($duration.TotalSeconds.ToString('F2'))s"
          Write-Host "Total results:       $count"
          Write-Host "Unique modules:      $($modules.Count)"
          Write-Host "Module list:         $($modules -join ', ')"

          if ($count -lt 1500) {
            throw "Full audit emitted only $count results (expected >=1500)"
          }
          if ($modules.Count -lt 14) {
            throw "Only $($modules.Count) modules contributed results (expected >=14)"
          }

          # Persist path for next step's schema validation
          $jsonPath | Out-File -FilePath .\test-output\full\jsonpath.txt -Encoding ASCII

      - name: Verify auto-logging (no -LogFile specified)
        shell: pwsh
        run: |
          New-Item -Path .\test-output\autolog -ItemType Directory -Force | Out-Null
          .\Windows-Security-Audit.ps1 `
            -Modules core `
            -OutputFormat JSON `
            -OutputPath .\test-output\autolog\out `
            -Quiet
          $logFiles = Get-ChildItem -Path .\logs -Filter 'audit-*.log' -ErrorAction SilentlyContinue
          if ($logFiles.Count -eq 0) {
            throw "Auto-logging did not create a log file in .\logs\"
          }
          Write-Host "Auto-created log: $($logFiles[0].Name)"

      - name: Validate JSON schema across all formats
        shell: pwsh
        run: |
          # Read the path captured by the previous full-audit step
          $jsonPath = (Get-Content .\test-output\full\jsonpath.txt -Raw).Trim()
          if (-not (Test-Path $jsonPath)) {
            throw "Full-audit JSON not found at: $jsonPath"
          }
          $data = Get-Content $jsonPath -Raw | ConvertFrom-Json

          # Validate against the actual JSON contract emitted by Export-JsonReport
          # (Windows-Security-Audit.ps1 ~ line 1610). The orchestrator deliberately
          # uses snake_case / lowercase keys in JSON output (matching JSON style
          # conventions), distinct from the PascalCase used in PowerShell objects
          # internally and in XML output.
          #
          # Required JSON-output schema (per Export-JsonReport in orchestrator):
          $required = @('module','category','status','severity','message',
                        'details','remediation','cross_references','timestamp')
          $validStatus = @('Pass','Fail','Warning','Info','Error')
          $validSeverity = @('Critical','High','Medium','Low','Informational')

          # Top-level structure
          $topLevel = $data.PSObject.Properties.Name
          foreach ($key in @('metadata','summary','results')) {
            if ($topLevel -notcontains $key) {
              throw "Top-level JSON key missing: '$key' (found: $($topLevel -join ', '))"
            }
          }

          # Per-result schema
          $schemaErrors = New-Object System.Collections.Generic.List[string]
          $resultIndex = 0
          foreach ($r in $data.results) {
            $names = $r.PSObject.Properties.Name
            foreach ($f in $required) {
              if ($names -notcontains $f) {
                $schemaErrors.Add("Result[$resultIndex] missing field '$f'")
              }
            }
            if ($validStatus -notcontains $r.status) {
              $schemaErrors.Add("Result[$resultIndex] has invalid status='$($r.status)'")
            }
            if ($validSeverity -notcontains $r.severity) {
              $schemaErrors.Add("Result[$resultIndex] has invalid severity='$($r.severity)'")
            }
            $resultIndex++
          }

          if ($schemaErrors.Count -gt 0) {
            Write-Host "First 10 schema errors:"
            $schemaErrors | Select-Object -First 10 | ForEach-Object { Write-Host "  $_" }
            Write-Host ""
            Write-Host "Sample of first result object (for diagnosis):"
            $data.results[0] | ConvertTo-Json -Depth 3 | Write-Host
            throw "Schema validation found $($schemaErrors.Count) errors across $resultIndex results"
          }
          Write-Host "Schema validation: all $resultIndex results conform to JSON schema"

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: audit-output-${{ matrix.os }}
          path: |
            test-output/**/*
            logs/**/*
          retention-days: 14

  # --------------------------------------------------------------------------
  # --------------------------------------------------------------------------
  # Self-hosted Windows client / older Server runners
  # --------------------------------------------------------------------------
  # See unit-tests.yml header for runner-label conventions.
  # GATING: Only runs when explicitly requested via workflow_dispatch input
  # OR on the weekly schedule. Without a gate, these matrix jobs queue
  # forever waiting for runners that may not exist on a given installation.
  # --------------------------------------------------------------------------
  e2e-self-hosted:
    name: E2E (${{ matrix.runner.os }})
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.include_self_hosted == true)
    runs-on:
      - self-hosted
      - ${{ matrix.runner.label }}
    timeout-minutes: 60
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        runner:
          - { label: server-2016,        os: 'Windows Server 2016' }
          - { label: win11-21h2,         os: 'Windows 11 21H2' }
          - { label: win11-22h2,         os: 'Windows 11 22H2' }
          - { label: win11-23h2,         os: 'Windows 11 23H2' }
          - { label: win11-24h2,         os: 'Windows 11 24H2' }
          - { label: win10-21h2,         os: 'Windows 10 21H2' }
          - { label: win10-22h2,         os: 'Windows 10 22H2' }
          - { label: win10-iotltsc-2021, os: 'Windows 10 IoT LTSC 2021' }

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify runner
        shell: pwsh
        run: |
          Write-Host "Expected: ${{ matrix.runner.os }}"
          $os = Get-CimInstance Win32_OperatingSystem
          Write-Host "Actual:   $($os.Caption) (build $($os.BuildNumber))"

      - name: Run audit (parallel, all 16 modules)
        shell: pwsh
        run: |
          $outDir = ".\test-output\${{ matrix.runner.label }}"
          New-Item -Path $outDir -ItemType Directory -Force | Out-Null
          .\Windows-Security-Audit.ps1 `
            -Modules All `
            -OutputFormat All `
            -OutputPath "$outDir\out" `
            -Parallel -Workers 4 `
            -Quiet
          $jsonFiles = @(Get-ChildItem -Path $outDir -Filter 'Windows-Security-Audit-*.json')
          if ($jsonFiles.Count -eq 0) {
            Write-Host "Directory contents:"
            Get-ChildItem $outDir | Format-Table -AutoSize
            throw "JSON output not generated in $outDir"
          }
          Write-Host "Generated: $($jsonFiles[0].Name)"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-${{ matrix.runner.label }}
          path: |
            test-output/**/*
            logs/**/*
          retention-days: 14
