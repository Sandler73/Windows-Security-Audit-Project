# ============================================================================
# Integration Tests Workflow
# ----------------------------------------------------------------------------
# Runs end-to-end audit executions across all currently-supported Windows
# versions to verify the orchestrator + modules + shared library work
# correctly as an integrated system.
#
# This is the slower of the two test workflows. Tests:
#   - Single-module standalone execution
#   - Full 16-module orchestrator execution
#   - All output formats (HTML, JSON, CSV, XML)
#   - Parallel vs sequential execution equivalence
#   - Cache vs no-cache behavior
#   - Auto-logging behavior
#   - Help system invocation forms
# ============================================================================

name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0'  # Weekly Sunday 6am UTC

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # GitHub-hosted Windows Server runners
  # --------------------------------------------------------------------------
  e2e-hosted:
    name: E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, windows-2022, windows-2019]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        shell: pwsh
        run: |
          Write-Host "OS: ${{ matrix.os }}"
          $os = Get-CimInstance Win32_OperatingSystem
          Write-Host "Caption: $($os.Caption)"
          Write-Host "Build:   $($os.BuildNumber)"
          Write-Host "PSVersion: $($PSVersionTable.PSVersion)"

      - name: Verify orchestrator help system
        shell: pwsh
        run: |
          $output = & .\Windows-Security-Audit.ps1 -Help 2>&1 | Out-String
          if ($output -notmatch 'Windows Security Audit') {
            throw "Help output missing expected content"
          }
          Write-Host "Help system: OK"

      - name: Verify module discovery
        shell: pwsh
        run: |
          $output = & .\Windows-Security-Audit.ps1 -ListModules 2>&1 | Out-String
          $expected = @('acsc','cis','cisa','cmmc','core','enisa','gdpr','hipaa',
                        'iso27001','ms','ms-defenderatp','nist','nsa','pcidss','soc2','stig')
          $missing = @()
          foreach ($mod in $expected) {
            if ($output -notmatch $mod) { $missing += $mod }
          }
          if ($missing.Count -gt 0) {
            throw "Modules missing from -ListModules output: $($missing -join ', ')"
          }
          Write-Host "All 16 modules discoverable"

      - name: Run single-module audit (core)
        shell: pwsh
        run: |
          New-Item -Path .\test-output -ItemType Directory -Force | Out-Null
          .\Windows-Security-Audit.ps1 `
            -Modules core `
            -OutputFormat JSON `
            -OutputPath .\test-output\core.json `
            -Quiet
          if (-not (Test-Path .\test-output\core.json)) {
            throw "core.json was not generated"
          }
          $data = Get-Content .\test-output\core.json -Raw | ConvertFrom-Json
          $count = @($data.Results).Count
          Write-Host "core module emitted $count results"
          if ($count -lt 100) {
            throw "core module emitted only $count results (expected >=100)"
          }

      - name: Run multi-module sequential audit
        shell: pwsh
        run: |
          .\Windows-Security-Audit.ps1 `
            -Modules core,cis,stig `
            -OutputFormat JSON `
            -OutputPath .\test-output\multi-seq.json `
            -Quiet
          $data = Get-Content .\test-output\multi-seq.json -Raw | ConvertFrom-Json
          $count = @($data.Results).Count
          Write-Host "Sequential 3-module audit: $count results"
          if ($count -lt 500) {
            throw "Multi-module audit emitted only $count results"
          }

      - name: Run multi-module parallel audit
        shell: pwsh
        run: |
          .\Windows-Security-Audit.ps1 `
            -Modules core,cis,stig `
            -OutputFormat JSON `
            -OutputPath .\test-output\multi-par.json `
            -Parallel -Workers 2 `
            -Quiet
          $data = Get-Content .\test-output\multi-par.json -Raw | ConvertFrom-Json
          $count = @($data.Results).Count
          Write-Host "Parallel 3-module audit: $count results"

          # Compare to sequential within 5%
          $seqData = Get-Content .\test-output\multi-seq.json -Raw | ConvertFrom-Json
          $seqCount = @($seqData.Results).Count
          $delta = [math]::Abs($count - $seqCount)
          $tolerance = $seqCount * 0.05
          if ($delta -gt $tolerance) {
            Write-Warning "Sequential and parallel results differ by $delta (>5%)"
          } else {
            Write-Host "Sequential and parallel within tolerance"
          }

      - name: Run all-format multi-output audit
        shell: pwsh
        run: |
          .\Windows-Security-Audit.ps1 `
            -Modules core `
            -OutputFormat All `
            -OutputPath .\test-output\all-format `
            -Quiet
          @('html','json','csv','xml') | ForEach-Object {
            $path = ".\test-output\all-format.$_"
            if (-not (Test-Path $path)) {
              throw "Expected output file missing: $path"
            }
            Write-Host "  Generated: $path"
          }

      - name: Run full 16-module audit (parallel)
        shell: pwsh
        run: |
          $start = Get-Date
          .\Windows-Security-Audit.ps1 `
            -Modules All `
            -OutputFormat JSON `
            -OutputPath .\test-output\full.json `
            -Parallel -Workers 4 `
            -Quiet
          $duration = (Get-Date) - $start

          $data = Get-Content .\test-output\full.json -Raw | ConvertFrom-Json
          $count = @($data.Results).Count
          $modules = @($data.Results.Module | Sort-Object -Unique)

          Write-Host ""
          Write-Host "Full audit duration: $($duration.TotalSeconds.ToString('F2'))s"
          Write-Host "Total results:       $count"
          Write-Host "Unique modules:      $($modules.Count)"
          Write-Host "Module list:         $($modules -join ', ')"

          if ($count -lt 3000) {
            throw "Full audit emitted only $count results (expected >=3000)"
          }
          if ($modules.Count -lt 14) {
            throw "Only $($modules.Count) modules contributed results (expected >=14)"
          }

      - name: Verify auto-logging (no -LogFile specified)
        shell: pwsh
        run: |
          .\Windows-Security-Audit.ps1 `
            -Modules core `
            -OutputFormat JSON `
            -OutputPath .\test-output\autolog-audit.json `
            -Quiet
          $logFiles = Get-ChildItem -Path .\logs -Filter 'audit-*.log' -ErrorAction SilentlyContinue
          if ($logFiles.Count -eq 0) {
            throw "Auto-logging did not create a log file in .\logs\"
          }
          Write-Host "Auto-created log: $($logFiles[0].Name)"

      - name: Validate JSON schema across all formats
        shell: pwsh
        run: |
          $jsonPath = '.\test-output\full.json'
          $data = Get-Content $jsonPath -Raw | ConvertFrom-Json

          $required = @('Module','Category','Status','Severity','Message',
                        'Details','Remediation','CrossReferences','Timestamp')
          $validStatus = @('Pass','Fail','Warning','Info','Error')
          $validSeverity = @('Critical','High','Medium','Low','Informational')

          $schemaErrors = 0
          foreach ($r in $data.Results) {
            $names = $r.PSObject.Properties.Name
            foreach ($f in $required) {
              if ($names -notcontains $f) { $schemaErrors++ }
            }
            if ($validStatus -notcontains $r.Status) { $schemaErrors++ }
            if ($validSeverity -notcontains $r.Severity) { $schemaErrors++ }
          }

          if ($schemaErrors -gt 0) {
            throw "Schema validation found $schemaErrors errors"
          }
          Write-Host "Schema validation: all results conform"

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-output-${{ matrix.os }}
          path: |
            test-output/**/*
            logs/**/*
          retention-days: 14

  # --------------------------------------------------------------------------
  # Self-hosted Windows client / older Server runners
  # --------------------------------------------------------------------------
  # See unit-tests.yml header for runner-label conventions.
  # --------------------------------------------------------------------------
  e2e-self-hosted:
    name: E2E (${{ matrix.runner.os }})
    runs-on:
      - self-hosted
      - ${{ matrix.runner.label }}
    timeout-minutes: 60
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        runner:
          - { label: server-2016,        os: 'Windows Server 2016' }
          - { label: win11-21h2,         os: 'Windows 11 21H2' }
          - { label: win11-22h2,         os: 'Windows 11 22H2' }
          - { label: win11-23h2,         os: 'Windows 11 23H2' }
          - { label: win11-24h2,         os: 'Windows 11 24H2' }
          - { label: win10-21h2,         os: 'Windows 10 21H2' }
          - { label: win10-22h2,         os: 'Windows 10 22H2' }
          - { label: win10-iotltsc-2021, os: 'Windows 10 IoT LTSC 2021' }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify runner
        shell: pwsh
        run: |
          Write-Host "Expected: ${{ matrix.runner.os }}"
          $os = Get-CimInstance Win32_OperatingSystem
          Write-Host "Actual:   $($os.Caption) (build $($os.BuildNumber))"

      - name: Run audit (parallel, all 16 modules)
        shell: pwsh
        run: |
          .\Windows-Security-Audit.ps1 `
            -Modules All `
            -OutputFormat All `
            -OutputPath .\test-output\${{ matrix.runner.label }} `
            -Parallel -Workers 4 `
            -Quiet
          if (-not (Test-Path ".\test-output\${{ matrix.runner.label }}.json")) {
            throw "JSON output not generated"
          }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.runner.label }}
          path: |
            test-output/**/*
            logs/**/*
          retention-days: 14
